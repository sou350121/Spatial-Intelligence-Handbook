name: Pulsar Spatial Daily

# Runs every weekday 00:30 UTC (≈ 08:30 CN time, after arxiv RSS refresh).
# Generates reports/spatial-daily/YYYY-MM-DD.md from arxiv cs.RO/CV/AI/LG.
#
# Required GitHub Secret (Settings → Secrets → Actions):
#   DASHSCOPE_API_KEY — Aliyun qwen3.5-plus API key
#
# Manual trigger: Actions tab → Pulsar Spatial Daily → Run workflow.

on:
  schedule:
    # Mon-Fri only (arxiv 沒週末發新)
    - cron: '30 0 * * 1-5'
  workflow_dispatch:  # manual trigger

permissions:
  contents: write  # need to push back to main
  issues: write    # failure sentinel opens/comments an issue

concurrency:
  group: pulsar-spatial-daily
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history to pull/rebase

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Pulsar pipeline
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: |
          python3 scripts/pulsar/run_daily.py

      # Commit the dated archive FIRST, before any audit. The daily report is
      # append-only archive content (reports/spatial-daily/) and must never be
      # silently discarded because of unrelated handbook drift elsewhere. The
      # full-handbook audit runs afterwards as an informational signal only; the
      # separate audit.yml workflow remains the real gate for content PRs/pushes.
      - name: Commit + push (if changed)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Configure git
          git config user.name "Pulsar Bot"
          git config user.email "noreply@anthropic.com"

          # Add scoped changes only (don't accidentally commit anything else).
          # reports/atlas/ = the 5-axis coordinate stream (atlas.jsonl) + its
          # generated overview, written by post.py alongside the daily report.
          git add reports/spatial-daily/ reports/atlas/

          # Exit cleanly if nothing changed (e.g. weekend or zero qualifying papers)
          if git diff --staged --quiet; then
            echo "No new spatial-daily report — skipping commit."
            exit 0
          fi

          # Commit with date in message (use here-doc to keep YAML indentation safe)
          DATE=$(date +%F)
          MSG=$(cat <<EOF
          auto(pulsar): spatial daily ${DATE}

          Generated by GitHub Actions workflow .github/workflows/pulsar-spatial-daily.yml
          Pipeline: collect.py → rate.py (qwen3.5-plus) → post.py
          EOF
          )
          git commit -m "$MSG"

          # Rebase AFTER commit — git refuses to pull-rebase with a staged index,
          # so pulling before commit kills every run that has a report to save.
          git pull --rebase origin main || {
            echo "Rebase failed — manual intervention needed."
            exit 1
          }

          # Push (retry once on conflict)
          git push origin main || {
            echo "Push conflict, retrying after rebase..."
            git pull --rebase origin main
            git push origin main
          }

      # Informational only — never blocks (or reverts) the archive commit above.
      - name: Handbook audit (informational)
        if: always()
        continue-on-error: true
        run: |
          python3 scripts/sync_readme_from_overview.py || true
          python3 scripts/handbook_audit.py

      # Sentinel: this pipeline silently produced nothing for weeks, twice.
      # Any step failure now surfaces as an issue instead of an ignored email.
      - name: Alert on failure (sentinel issue)
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="[pipeline-alert] Pulsar spatial daily is failing"
          BODY="Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} ($(date -u +%FT%TZ))"
          NUM=$(gh issue list --state open --search "$TITLE in:title" --json number --jq '.[0].number // empty' || true)
          if [ -n "$NUM" ]; then
            gh issue comment "$NUM" --body "$BODY"
          else
            gh issue create --title "$TITLE" --body "$BODY"
          fi
