name: Pulsar Spatial Dissection

# Weekly: qwen drafts one new deep-dive dissection from a surfaced perception paper
# and opens a PR. Opus/a human verifies the facts against the source and merges —
# the "qwen 跑 / Opus 验" contract. Nothing auto-lands on main.
#
# Required secret: DASHSCOPE_API_KEY (shared with the daily pipeline).

on:
  schedule:
    - cron: '0 6 * * 3'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pulsar-spatial-dissection
  cancel-in-progress: false

jobs:
  dissection:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: qwen writes a dissection (guarded)
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: python3 scripts/pulsar/run_dissection.py || true

      - name: Sync counts and open a PR if a dissection was placed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW=$(git status --porcelain | grep '_dissection.md' | grep '^??' | awk '{print $2}' | head -1)
          if [ -z "$NEW" ]; then
            echo "No new dissection this run (no candidate, or guard rejected the draft)."
            exit 0
          fi
          echo "New dissection: $NEW"
          python3 scripts/sync_counts.py
          python3 scripts/gen_mintlify_nav.py > docs.json
          python3 scripts/sync_readme_from_overview.py || true
          git config user.name "Pulsar Bot"
          git config user.email "noreply@anthropic.com"
          SLUG=$(basename "$NEW" _dissection.md)
          BR="dissection/${SLUG}-$(date +%s)"
          git checkout -b "$BR"
          git add -A
          git commit -q -m "feat(handbook): +1 dissection (qwen draft) — ${SLUG}"
          git push -u origin "$BR"
          SRC=$(grep -oE 'https://arxiv.org/abs/[0-9.]+' "$NEW" | head -1)
          {
            echo "qwen drafted this dissection from arXiv full text. Source: ${SRC:-n/a}"
            echo "File: \`${NEW}\`"
            echo ""
            echo "**Opus / human verification gate (do before merge):**"
            echo "- [ ] Facts vs source: model name / benchmark numbers / specific layer indices (qwen occasionally hallucinates)"
            echo "- [ ] Archive zone is correct"
            echo "- [ ] UNVERIFIED discipline on numbers the paper does not give / not reproduced on hardware"
            echo "- [ ] 14-item structure is guard-enforced; audit CI should be green (counts synced)"
            echo ""
            echo "Merge once verified. Contract: qwen generates, Opus/human verifies before it lands."
          } > /tmp/pr_body.md
          gh pr create --base main --head "$BR" \
            --title "dissection: ${SLUG} (qwen draft — verify + merge)" \
            --body-file /tmp/pr_body.md
          echo "PR opened for $BR"
