name: Pulsar Spatial Dissection

# Daily: qwen drafts several new deep-dive dissections from surfaced perception
# papers and auto-commits them to main. The handbook grows every day.
#
# Quality gates (no human in the daily loop — qwen quota is ample, so verification
# is a second qwen pass, not a PR review):
#   1. structural guard — 14-item template must be complete (regenerate up to 3x)
#   2. qwen fact-check   — a second qwen pass flags hallucinated numbers/names/layers
#   3. audit-green gate  — nothing is pushed unless handbook_audit.py passes
# Opus/human review is periodic (spot-audit), not per-article.
#
# Required secret: DASHSCOPE_API_KEY (shared with the daily pipeline).

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: pulsar-spatial-dissection
  cancel-in-progress: false

env:
  DISSECTIONS_PER_DAY: '3'

jobs:
  dissection:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: qwen writes dissections (guarded + fact-checked)
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: python3 scripts/pulsar/run_dissection.py --count "${DISSECTIONS_PER_DAY}" || true

      - name: Sync counts, audit-gate, commit to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! git status --porcelain | grep -q '_dissection.md'; then
            echo "No new dissection this run."
            exit 0
          fi
          N=$(git status --porcelain | grep -c '_dissection.md')
          echo "Placed $N new dissection(s)."

          # Mechanical landing: recompute every audit-enforced count from the tree.
          python3 scripts/sync_counts.py
          python3 scripts/gen_mintlify_nav.py > docs.json
          python3 scripts/sync_readme_from_overview.py || true

          # Audit-green gate: never push a red tree (bad counts / broken links / etc).
          if ! python3 scripts/handbook_audit.py; then
            echo "AUDIT FAILED — refusing to push. Drafts discarded this run."
            exit 1
          fi

          git config user.name "Pulsar Bot"
          git config user.email "noreply@anthropic.com"
          git add -A
          git commit -q -m "feat(handbook): +${N} dissection(s) (qwen daily, guard+factcheck+audit-green)"
          git pull --rebase origin main || { echo "rebase conflict"; exit 1; }
          git push origin main || { git pull --rebase origin main && git push origin main; }
          echo "Pushed ${N} dissection(s) to main."

      - name: Alert on failure (sentinel)
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="[pipeline-alert] Pulsar spatial dissection is failing"
          BODY="Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} ($(date -u +%FT%TZ))"
          NUM=$(gh issue list --state open --search "$TITLE in:title" --json number --jq '.[0].number // empty' || true)
          if [ -n "$NUM" ]; then gh issue comment "$NUM" --body "$BODY"; else gh issue create --title "$TITLE" --body "$BODY"; fi
