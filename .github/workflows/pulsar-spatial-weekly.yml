name: Pulsar Spatial Weekly

# Runs Friday 02:00 UTC (≈ 10:00 CN), after the week's dailies (incl. Friday's 00:30).
# Aggregates reports/spatial-daily/ from the past 7 days into a forward-looking weekly
# synthesis → reports/weekly/YYYY-Www.md.
#
# Required GitHub Secret: DASHSCOPE_API_KEY (already set for the daily pipeline).
# Manual trigger: Actions tab → Pulsar Spatial Weekly → Run workflow.

on:
  schedule:
    - cron: '0 2 * * 5'   # Friday 02:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  issues: write    # failure sentinel opens/comments an issue

concurrency:
  group: pulsar-spatial-weekly
  cancel-in-progress: false

jobs:
  weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run weekly synthesis
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: |
          python3 scripts/pulsar/run_weekly.py

      # Archive-first, audit-informational (same resilient design as the daily pipeline).
      - name: Commit + push (if changed)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "Pulsar Bot"
          git config user.email "noreply@anthropic.com"
          git add reports/weekly/
          if git diff --staged --quiet; then
            echo "No new weekly report (no dailies in window?) — skipping commit."
            exit 0
          fi
          DATE=$(date +%F)
          MSG=$(cat <<EOF
          auto(pulsar): spatial weekly ${DATE}

          Generated by GitHub Actions workflow .github/workflows/pulsar-spatial-weekly.yml
          Pipeline: run_weekly.py (aggregate 7d dailies → qwen3.5-plus forward-looking synthesis)
          EOF
          )
          git commit -m "$MSG"
          # Rebase AFTER commit — pull-rebase refuses a staged index (bug that killed the daily pipeline).
          git pull --rebase origin main || { echo "Rebase failed — manual intervention needed."; exit 1; }
          git push origin main || {
            echo "Push conflict, retrying after rebase..."
            git pull --rebase origin main
            git push origin main
          }

      - name: Handbook audit (informational)
        if: always()
        continue-on-error: true
        run: |
          python3 scripts/sync_readme_from_overview.py || true
          python3 scripts/handbook_audit.py

      # Sentinel: surface failures as an issue instead of an ignored email.
      - name: Alert on failure (sentinel issue)
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="[pipeline-alert] Pulsar spatial weekly is failing"
          BODY="Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} ($(date -u +%FT%TZ))"
          NUM=$(gh issue list --state open --search "$TITLE in:title" --json number --jq '.[0].number // empty' || true)
          if [ -n "$NUM" ]; then
            gh issue comment "$NUM" --body "$BODY"
          else
            gh issue create --title "$TITLE" --body "$BODY"
          fi
