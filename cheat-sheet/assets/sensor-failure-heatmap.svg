<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="-apple-system, system-ui, sans-serif">
  <title>Sensor modality failure heatmap — 誰怕誰</title>

  <!-- Title -->
  <text x="450" y="22" text-anchor="middle" fill="#bbb" font-size="14" font-weight="700">Sensor modality 失敗交叉表 — 誰怕誰</text>
  <text x="450" y="40" text-anchor="middle" fill="#888" font-size="11" font-style="italic">綠 ✅ 能用 / 黃 ⚠ 部分失敗 / 紅 ❌ 不能用</text>

  <!-- Column headers (sensors) -->
  <g font-size="10" fill="#fff">
    <rect x="220" y="55" width="90" height="40" fill="#1a1a2e" stroke="#444"/>
    <text x="265" y="75" text-anchor="middle">RGB</text>
    <text x="265" y="88" text-anchor="middle" fill="#888" font-size="9">passive</text>

    <rect x="310" y="55" width="90" height="40" fill="#1a1a2e" stroke="#444"/>
    <text x="355" y="75" text-anchor="middle">D435</text>
    <text x="355" y="88" text-anchor="middle" fill="#888" font-size="9">active stereo</text>

    <rect x="400" y="55" width="90" height="40" fill="#1a1a2e" stroke="#444"/>
    <text x="445" y="72" text-anchor="middle">LiDAR</text>
    <text x="445" y="86" text-anchor="middle" fill="#888" font-size="8">905 nm</text>

    <rect x="490" y="55" width="90" height="40" fill="#1a1a2e" stroke="#444"/>
    <text x="535" y="72" text-anchor="middle">LiDAR</text>
    <text x="535" y="86" text-anchor="middle" fill="#888" font-size="8">1550 nm</text>

    <rect x="580" y="55" width="90" height="40" fill="#1a1a2e" stroke="#444"/>
    <text x="625" y="72" text-anchor="middle">mmWave</text>
    <text x="625" y="86" text-anchor="middle" fill="#888" font-size="8">radar</text>

    <rect x="670" y="55" width="90" height="40" fill="#1a1a2e" stroke="#444"/>
    <text x="715" y="72" text-anchor="middle">4D radar</text>
    <text x="715" y="86" text-anchor="middle" fill="#888" font-size="8">imaging</text>

    <rect x="760" y="55" width="90" height="40" fill="#1a1a2e" stroke="#444"/>
    <text x="805" y="72" text-anchor="middle">Sonar</text>
    <text x="805" y="86" text-anchor="middle" fill="#888" font-size="8">acoustic</text>
  </g>

  <!-- Row labels (environments) -->
  <!-- Cells: green = #1a3a2a (mid-green) for ✅, yellow = #3a3a1a for ⚠, red = #3a1a1a for ❌ -->

  <!-- Row 1: 透明 (玻璃) -->
  <rect x="0" y="95" width="220" height="35" fill="#1a1a2e" stroke="#444"/>
  <text x="210" y="115" text-anchor="end" fill="#fff" font-size="11">透明 (玻璃)</text>
  <text x="210" y="127" text-anchor="end" fill="#888" font-size="9">glass / clear acrylic</text>
  <rect x="220" y="95" width="90" height="35" fill="#3a1a1a" stroke="#444"/><text x="265" y="118" text-anchor="middle" fill="#fff" font-size="14">❌</text>
  <rect x="310" y="95" width="90" height="35" fill="#3a1a1a" stroke="#444"/><text x="355" y="118" text-anchor="middle" fill="#fff" font-size="14">❌</text>
  <rect x="400" y="95" width="90" height="35" fill="#3a1a1a" stroke="#444"/><text x="445" y="118" text-anchor="middle" fill="#fff" font-size="14">❌</text>
  <rect x="490" y="95" width="90" height="35" fill="#3a3a1a" stroke="#444"/><text x="535" y="118" text-anchor="middle" fill="#fff" font-size="14">⚠</text>
  <rect x="580" y="95" width="90" height="35" fill="#1a3a2a" stroke="#444"/><text x="625" y="118" text-anchor="middle" fill="#fff" font-size="14">✅</text>
  <rect x="670" y="95" width="90" height="35" fill="#1a3a2a" stroke="#444"/><text x="715" y="118" text-anchor="middle" fill="#fff" font-size="14">✅</text>
  <rect x="760" y="95" width="90" height="35" fill="#3a3a1a" stroke="#444"/><text x="805" y="118" text-anchor="middle" fill="#fff" font-size="14">⚠</text>

  <!-- Row 2: 鏡面 (拋光金屬) -->
  <rect x="0" y="130" width="220" height="35" fill="#1a1a2e" stroke="#444"/>
  <text x="210" y="150" text-anchor="end" fill="#fff" font-size="11">鏡面 (拋光金屬)</text>
  <text x="210" y="162" text-anchor="end" fill="#888" font-size="9">specular metal</text>
  <rect x="220" y="130" width="90" height="35" fill="#3a3a1a" stroke="#444"/><text x="265" y="153" text-anchor="middle" fill="#fff" font-size="14">⚠</text>
  <rect x="310" y="130" width="90" height="35" fill="#3a1a1a" stroke="#444"/><text x="355" y="153" text-anchor="middle" fill="#fff" font-size="14">❌</text>
  <rect x="400" y="130" width="90" height="35" fill="#3a1a1a" stroke="#444"/><text x="445" y="153" text-anchor="middle" fill="#fff" font-size="14">❌</text>
  <rect x="490" y="130" width="90" height="35" fill="#3a1a1a" stroke="#444"/><text x="535" y="153" text-anchor="middle" fill="#fff" font-size="14">❌</text>
  <rect x="580" y="130" width="90" height="35" fill="#3a3a1a" stroke="#444"/><text x="625" y="153" text-anchor="middle" fill="#fff" font-size="14">⚠</text>
  <rect x="670" y="130" width="90" height="35" fill="#3a3a1a" stroke="#444"/><text x="715" y="153" text-anchor="middle" fill="#fff" font-size="14">⚠</text>
  <rect x="760" y="130" width="90" height="35" fill="#3a3a1a" stroke="#444"/><text x="805" y="153" text-anchor="middle" fill="#fff" font-size="14">⚠</text>

  <!-- Row 3: 暗環境 -->
  <rect x="0" y="165" width="220" height="35" fill="#1a1a2e" stroke="#444"/>
  <text x="210" y="185" text-anchor="end" fill="#fff" font-size="11">暗環境 / 黑夜</text>
  <text x="210" y="197" text-anchor="end" fill="#888" font-size="9">low-light / night</text>
  <rect x="220" y="165" width="90" height="35" fill="#3a1a1a" stroke="#444"/><text x="265" y="188" text-anchor="middle" fill="#fff" font-size="14">❌</text>
  <rect x="310" y="165" width="90" height="35" fill="#1a3a2a" stroke="#444"/><text x="355" y="188" text-anchor="middle" fill="#fff" font-size="14">✅</text>
  <rect x="400" y="165" width="90" height="35" fill="#1a3a2a" stroke="#444"/><text x="445" y="188" text-anchor="middle" fill="#fff" font-size="14">✅</text>
  <rect x="490" y="165" width="90" height="35" fill="#1a3a2a" stroke="#444"/><text x="535" y="188" text-anchor="middle" fill="#fff" font-size="14">✅</text>
  <rect x="580" y="165" width="90" height="35" fill="#1a3a2a" stroke="#444"/><text x="625" y="188" text-anchor="middle" fill="#fff" font-size="14">✅</text>
  <rect x="670" y="165" width="90" height="35" fill="#1a3a2a" stroke="#444"/><text x="715" y="188" text-anchor="middle" fill="#fff" font-size="14">✅</text>
  <rect x="760" y="165" width="90" height="35" fill="#1a3a2a" stroke="#444"/><text x="805" y="188" text-anchor="middle" fill="#fff" font-size="14">✅</text>

  <!-- Row 4: 強光 / 陽光直射 -->
  <rect x="0" y="200" width="220" height="35" fill="#1a1a2e" stroke="#444"/>
  <text x="210" y="220" text-anchor="end" fill="#fff" font-size="11">強光 / 陽光直射</text>
  <text x="210" y="232" text-anchor="end" fill="#888" font-size="9">direct sunlight</text>
  <rect x="220" y="200" width="90" height="35" fill="#3a3a1a" stroke="#444"/><text x="265" y="223" text-anchor="middle" fill="#fff" font-size="14">⚠</text>
  <rect x="310" y="200" width="90" height="35" fill="#3a1a1a" stroke="#444"/><text x="355" y="223" text-anchor="middle" fill="#fff" font-size="14">❌</text>
  <rect x="400" y="200" width="90" height="35" fill="#3a1a1a" stroke="#444"/><text x="445" y="223" text-anchor="middle" fill="#fff" font-size="14">❌</text>
  <rect x="490" y="200" width="90" height="35" fill="#3a3a1a" stroke="#444"/><text x="535" y="223" text-anchor="middle" fill="#fff" font-size="14">⚠</text>
  <rect x="580" y="200" width="90" height="35" fill="#1a3a2a" stroke="#444"/><text x="625" y="223" text-anchor="middle" fill="#fff" font-size="14">✅</text>
  <rect x="670" y="200" width="90" height="35" fill="#1a3a2a" stroke="#444"/><text x="715" y="223" text-anchor="middle" fill="#fff" font-size="14">✅</text>
  <rect x="760" y="200" width="90" height="35" fill="#222" stroke="#444"/><text x="805" y="223" text-anchor="middle" fill="#666" font-size="11">n/a</text>

  <!-- Row 5: 雨 / 霧 -->
  <rect x="0" y="235" width="220" height="35" fill="#1a1a2e" stroke="#444"/>
  <text x="210" y="255" text-anchor="end" fill="#fff" font-size="11">雨 / 霧 / 雪</text>
  <text x="210" y="267" text-anchor="end" fill="#888" font-size="9">rain / fog / snow</text>
  <rect x="220" y="235" width="90" height="35" fill="#3a3a1a" stroke="#444"/><text x="265" y="258" text-anchor="middle" fill="#fff" font-size="14">⚠</text>
  <rect x="310" y="235" width="90" height="35" fill="#3a1a1a" stroke="#444"/><text x="355" y="258" text-anchor="middle" fill="#fff" font-size="14">❌</text>
  <rect x="400" y="235" width="90" height="35" fill="#3a1a1a" stroke="#444"/><text x="445" y="258" text-anchor="middle" fill="#fff" font-size="14">❌</text>
  <rect x="490" y="235" width="90" height="35" fill="#3a3a1a" stroke="#444"/><text x="535" y="258" text-anchor="middle" fill="#fff" font-size="14">⚠</text>
  <rect x="580" y="235" width="90" height="35" fill="#1a3a2a" stroke="#444"/><text x="625" y="258" text-anchor="middle" fill="#fff" font-size="14">✅</text>
  <rect x="670" y="235" width="90" height="35" fill="#1a3a2a" stroke="#444"/><text x="715" y="258" text-anchor="middle" fill="#fff" font-size="14">✅</text>
  <rect x="760" y="235" width="90" height="35" fill="#222" stroke="#444"/><text x="805" y="258" text-anchor="middle" fill="#666" font-size="11">n/a</text>

  <!-- Row 6: 水下 >10m -->
  <rect x="0" y="270" width="220" height="35" fill="#1a1a2e" stroke="#444"/>
  <text x="210" y="290" text-anchor="end" fill="#fff" font-size="11">水下 &gt; 10m</text>
  <text x="210" y="302" text-anchor="end" fill="#888" font-size="9">underwater deep</text>
  <rect x="220" y="270" width="90" height="35" fill="#3a1a1a" stroke="#444"/><text x="265" y="293" text-anchor="middle" fill="#fff" font-size="14">❌</text>
  <rect x="310" y="270" width="90" height="35" fill="#3a1a1a" stroke="#444"/><text x="355" y="293" text-anchor="middle" fill="#fff" font-size="14">❌</text>
  <rect x="400" y="270" width="90" height="35" fill="#3a1a1a" stroke="#444"/><text x="445" y="293" text-anchor="middle" fill="#fff" font-size="14">❌</text>
  <rect x="490" y="270" width="90" height="35" fill="#3a1a1a" stroke="#444"/><text x="535" y="293" text-anchor="middle" fill="#fff" font-size="14">❌</text>
  <rect x="580" y="270" width="90" height="35" fill="#3a1a1a" stroke="#444"/><text x="625" y="293" text-anchor="middle" fill="#fff" font-size="14">❌</text>
  <rect x="670" y="270" width="90" height="35" fill="#3a1a1a" stroke="#444"/><text x="715" y="293" text-anchor="middle" fill="#fff" font-size="14">❌</text>
  <rect x="760" y="270" width="90" height="35" fill="#1a3a2a" stroke="#444" stroke-width="2"/><text x="805" y="293" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">✅</text>

  <!-- Row 7: 動態 / 高速 -->
  <rect x="0" y="305" width="220" height="35" fill="#1a1a2e" stroke="#444"/>
  <text x="210" y="325" text-anchor="end" fill="#fff" font-size="11">動態 / 高速移動</text>
  <text x="210" y="337" text-anchor="end" fill="#888" font-size="9">dynamic / fast motion</text>
  <rect x="220" y="305" width="90" height="35" fill="#3a3a1a" stroke="#444"/><text x="265" y="328" text-anchor="middle" fill="#fff" font-size="14">⚠</text>
  <rect x="310" y="305" width="90" height="35" fill="#3a3a1a" stroke="#444"/><text x="355" y="328" text-anchor="middle" fill="#fff" font-size="14">⚠</text>
  <rect x="400" y="305" width="90" height="35" fill="#3a3a1a" stroke="#444"/><text x="445" y="328" text-anchor="middle" fill="#fff" font-size="14">⚠</text>
  <rect x="490" y="305" width="90" height="35" fill="#3a3a1a" stroke="#444"/><text x="535" y="328" text-anchor="middle" fill="#fff" font-size="14">⚠</text>
  <rect x="580" y="305" width="90" height="35" fill="#1a3a2a" stroke="#444"/><text x="625" y="328" text-anchor="middle" fill="#fff" font-size="14">✅</text>
  <rect x="670" y="305" width="90" height="35" fill="#1a3a2a" stroke="#444"/><text x="715" y="324" text-anchor="middle" fill="#fff" font-size="14">✅</text>
  <text x="715" y="336" text-anchor="middle" fill="#888" font-size="8">Doppler</text>
  <rect x="760" y="305" width="90" height="35" fill="#3a3a1a" stroke="#444"/><text x="805" y="328" text-anchor="middle" fill="#fff" font-size="14">⚠</text>

  <!-- Row 8: 稀紋理 -->
  <rect x="0" y="340" width="220" height="35" fill="#1a1a2e" stroke="#444"/>
  <text x="210" y="360" text-anchor="end" fill="#fff" font-size="11">稀紋理</text>
  <text x="210" y="372" text-anchor="end" fill="#888" font-size="9">textureless walls</text>
  <rect x="220" y="340" width="90" height="35" fill="#3a1a1a" stroke="#444"/><text x="265" y="363" text-anchor="middle" fill="#fff" font-size="14">❌</text>
  <rect x="310" y="340" width="90" height="35" fill="#1a3a2a" stroke="#444"/><text x="355" y="358" text-anchor="middle" fill="#fff" font-size="14">✅</text>
  <text x="355" y="370" text-anchor="middle" fill="#888" font-size="8">pattern</text>
  <rect x="400" y="340" width="90" height="35" fill="#1a3a2a" stroke="#444"/><text x="445" y="363" text-anchor="middle" fill="#fff" font-size="14">✅</text>
  <rect x="490" y="340" width="90" height="35" fill="#1a3a2a" stroke="#444"/><text x="535" y="363" text-anchor="middle" fill="#fff" font-size="14">✅</text>
  <rect x="580" y="340" width="90" height="35" fill="#3a3a1a" stroke="#444"/><text x="625" y="363" text-anchor="middle" fill="#fff" font-size="14">⚠</text>
  <rect x="670" y="340" width="90" height="35" fill="#3a3a1a" stroke="#444"/><text x="715" y="363" text-anchor="middle" fill="#fff" font-size="14">⚠</text>
  <rect x="760" y="340" width="90" height="35" fill="#222" stroke="#444"/><text x="805" y="363" text-anchor="middle" fill="#666" font-size="11">n/a</text>

  <!-- Pattern insights -->
  <rect x="40" y="395" width="820" height="70" rx="6" fill="#0a0a14" stroke="#555" stroke-width="1"/>
  <text x="60" y="415" fill="#bbb" font-size="11" font-weight="700">🔑 讀圖 takeaways：</text>
  <text x="60" y="432" fill="#fff" font-size="10">• <tspan fill="#e94560">RGB 是「凡稀紋理 / 暗 / 雨 都 ❌」</tspan> → 為什麼 IMU 在 aerial 是 mandatory</text>
  <text x="60" y="447" fill="#fff" font-size="10">• <tspan fill="#f77f00">LiDAR 怕陽光 (905 nm) + 玻璃 + 鏡面</tspan> → 為什麼 Waymo 用 1550 nm + 4D radar 補</text>
  <text x="60" y="462" fill="#fff" font-size="10">• <tspan fill="#06a0a0">水下 &gt;10m 只 sonar 一條路</tspan> → 為什麼 marine 沒 vision 主導 stack</text>
</svg>
